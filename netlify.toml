[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Vite embeds VITE_* values in dist/ at build time. Those are public client config
# (RLS-protected), not server secrets. Tell Netlify not to fail the build when
# the same URL/key strings appear in output.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY,VITE_GOOGLE_CLIENT_ID,VITE_APP_URL"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  autoLaunch = false

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
