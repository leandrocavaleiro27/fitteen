[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Public client vars are intentionally embedded in the JS bundle at build time.
# Omit them from secret scanning (they are not server secrets; RLS protects data).
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  autoLaunch = false

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
